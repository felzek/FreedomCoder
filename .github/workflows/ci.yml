name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync environment
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Smoke test CLI
        run: uv run freedomcoder profiles list

      - name: Compile source
        run: uv run python -m compileall src tests
